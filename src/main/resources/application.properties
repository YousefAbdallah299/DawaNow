app.upload.dir=uploads/licenses
app.upload.max-size-mb=15

# Catalog RAG through the Student Bedrock Gateway. The key calls the gateway, not AWS directly.
dawanow.ai.provider=student-bedrock-gateway
dawanow.ai.base-url=${SBG_BASE_URL:}
dawanow.ai.api-key=${SBG_API_KEY:}
dawanow.ai.embedding-model=${SBG_EMBEDDING_MODEL:amazon.titan-embed-text-v2:0:8k}
dawanow.ai.generation-model=${SBG_CHAT_MODEL:openai.gpt-oss-20b-1:0}
dawanow.ai.generation-max-tokens=${SBG_CHAT_MAX_TOKENS:400}
dawanow.ai.request-timeout=${SBG_REQUEST_TIMEOUT:2m}

dawanow.ai.retrieval.initialize-on-startup=${AI_RETRIEVAL_INITIALIZE_ON_STARTUP:true}
dawanow.ai.retrieval.embedding-batch-size=${SBG_EMBEDDING_BATCH_SIZE:64}
dawanow.ai.retrieval.default-top-k=${AI_RETRIEVAL_TOP_K:8}
dawanow.ai.retrieval.max-top-k=${AI_RETRIEVAL_MAX_TOP_K:20}
dawanow.ai.retrieval.semantic-weight=${AI_RETRIEVAL_SEMANTIC_WEIGHT:0.70}
dawanow.ai.retrieval.minimum-score=${AI_RETRIEVAL_MINIMUM_SCORE:0.20}
