spring.application.name=dawa-now

spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3307/dawanow}
spring.datasource.username=${DB_USERNAME:dawanow}
spring.datasource.password=${DB_PASSWORD:dawanow}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.open-in-view=false
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.batch_size=500
spring.jpa.properties.hibernate.order_inserts=true

dawanow.data.products.import-enabled=${PRODUCT_IMPORT_ENABLED:true}

server.port=${SERVER_PORT:8080}

management.endpoints.web.exposure.include=health,info

# JWT Configuration
#randomly generated 512-bit hex key
jwt.secret=${JWT_SECRET:5f4d80a13e52f50a32d1f9b3e6a4c28c89d2b71f50a9e2d3c4b5a6f7e8d9c0b1a2f3e4d5c6b7a8f9e0d1c2b3a4f5e6d7c8b9a0f1e2d3c4b5a6f7e8d9c0b1a2f3}

# 24 hours in milliseconds
jwt.expiration=900000

jwt.refresh-expiration=604800000

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

dawanow.upload.license-dir=${LICENSE_UPLOAD_DIR:uploads/licenses}

