services:
  db:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-dawanow}
      MYSQL_USER: ${MYSQL_USER:-dawanow}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-dawanow}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
    ports:
      - "${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD:-rootpass}"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 20s

  app:
    build:
      context: .
    environment:
      SERVER_PORT: 8080
      DB_URL: jdbc:mysql://db:3306/${MYSQL_DATABASE:-dawanow}
      DB_USERNAME: ${MYSQL_USER:-dawanow}
      DB_PASSWORD: ${MYSQL_PASSWORD:-dawanow}
      JPA_DDL_AUTO: ${JPA_DDL_AUTO:-update}
      PRODUCT_IMPORT_ENABLED: "true"
      DAWANOW_DATA_DUMMY_ENABLED: ${DUMMY_DATA_ENABLED:-false}
      JWT_SECRET: ${JWT_SECRET:-5f4d80a13e52f50a32d1f9b3e6a4c28c89d2b71f50a9e2d3c4b5a6f7e8d9c0b1a2f3e4d5c6b7a8f9e0d1c2b3a4f5e6d7c8b9a0f1e2d3c4b5a6f7e8d9c0b1a2f3}
      MAIL_USERNAME: ${MAIL_USERNAME:-}
      MAIL_PASSWORD: ${MAIL_PASSWORD:-}
      SBG_API_KEY: ${SBG_API_KEY:-}
      SBG_BASE_URL: ${SBG_BASE_URL:-}
      AI_EMBEDDING_PROVIDER: ${AI_EMBEDDING_PROVIDER:-ollama}
      AI_EMBEDDING_BASE_URL: ${AI_EMBEDDING_BASE_URL:-http://host.docker.internal:11434}
      AI_EMBEDDING_MODEL: ${AI_EMBEDDING_MODEL:-nomic-embed-text:latest}
      SBG_CHAT_MODEL: ${SBG_CHAT_MODEL:-openai.gpt-oss-20b-1:0}
      SBG_CHAT_MAX_TOKENS: ${SBG_CHAT_MAX_TOKENS:-400}
      SBG_EMBEDDING_BATCH_SIZE: ${SBG_EMBEDDING_BATCH_SIZE:-64}
      AI_RETRIEVAL_INITIALIZE_ON_STARTUP: ${AI_RETRIEVAL_INITIALIZE_ON_STARTUP:-true}
    ports:
      - "${APP_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
        restart: true
    restart: unless-stopped

volumes:
  mysql-data:
